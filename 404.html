<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script>
  var base = '/creeks-cafe';
  var path = window.location.pathname;
  var route = path.startsWith(base) ? path.slice(base.length) : path;
  window.location.replace(
    window.location.origin + base + '/?p=' + encodeURIComponent(route.replace(/^\//, '') + window.location.search) + window.location.hash
  );
</script>
</head>
</html>
